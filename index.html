<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 💜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Great+Vibes&family=Satisfy&family=Caveat:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, #fff, transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, #ddd, transparent),
                radial-gradient(2px 2px at 160px 30px, #fff, transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: twinkle 20s linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .side-emojis {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .left-side {
            position: absolute;
            left: 8%;
            top: 0;
            height: 100%;
            width: 60px;
        }

        .right-side {
            position: absolute;
            right: 8%;
            top: 0;
            height: 100%;
            width: 60px;
        }

        .side-emoji {
            position: absolute;
            font-size: 36px;
            animation: sideFlow 14s linear infinite;
            filter: drop-shadow(0 0 15px #8a2be2);
            color: #8a2be2;
        }

        .left-side .side-emoji {
            animation-name: sideFlowLeft;
            transform: rotate(-10deg);
        }

        .right-side .side-emoji {
            animation-name: sideFlowRight;
            transform: rotate(10deg);
        }

        @keyframes sideFlowLeft {
            0% {
                transform: translateX(-80px) translateY(100vh) rotate(-10deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateX(40px) translateY(-120px) rotate(-10deg);
                opacity: 0;
            }
        }

        @keyframes sideFlowRight {
            0% {
                transform: translateX(80px) translateY(100vh) rotate(10deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateX(-40px) translateY(-120px) rotate(10deg);
                opacity: 0;
            }
        }

        .card {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(40px);
            border-radius: 45px;
            padding: 90px 80px;
            text-align: center;
            box-shadow: 
                0 0 80px rgba(255, 255, 255, 0.15),
                0 0 160px rgba(138, 43, 226, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.3);
            border: 2px solid rgba(255,255,255,0.2);
            max-width: 650px;
            position: relative;
            z-index: 10;
            animation: blackFloat 7s ease-in-out infinite;
        }

        @keyframes blackFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            font-size: 5.2em;
            font-weight: 400;
            background: linear-gradient(45deg, #fff, #f5f5f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            animation: neonGlow 3s ease-in-out infinite alternate;
            line-height: 1;
            text-shadow: 
                0 0 20px #fff,
                0 0 30px #fff,
                0 0 50px #8a2be2,
                0 0 70px #8a2be2;
            letter-spacing: 5px;
        }

        @keyframes neonGlow {
            from { 
                text-shadow: 
                    0 0 20px #fff,
                    0 0 30px #fff,
                    0 0 50px #8a2be2;
            }
            to { 
                text-shadow: 
                    0 0 30px #fff,
                    0 0 40px #fff,
                    0 0 60px #8a2be2,
                    0 0 80px #8a2be2;
            }
        }

        .happy-emojis {
            font-size: 4em;
            display: block;
            margin: 35px 0;
            animation: emojiPulse 3.5s ease-in-out infinite;
            filter: drop-shadow(0 0 25px #ffd700);
            color: #ffd700;
        }

        @keyframes emojiPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }

        .name-text {
            font-family: 'Caveat', cursive;
            font-size: 4.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #fafafa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 40px 0 30px 0;
            animation: nameNeon 4.5s ease-in-out infinite;
            text-shadow: 
                0 0 25px #fff,
                0 0 35px #ba55d3,
                0 0 55px #ba55d3;
            letter-spacing: 6px;
        }

        @keyframes nameNeon {
            0%, 100% { filter: drop-shadow(0 0 25px #fff); }
            50% { filter: drop-shadow(0 0 45px #ba55d3); }
        }

        .bottom-emojis {
            font-size: 3.8em;
            margin-top: 25px;
            animation: emojiBounce 3s ease-in-out infinite;
            filter: drop-shadow(0 0 22px #ff69b4);
            color: #ff69b4;
        }

        @keyframes emojiBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px); }
        }

        @media (max-width: 600px) {
            .card { padding: 70px 55px; margin: 20px; }
            .main-title { font-size: 4.2em; }
            .name-text { font-size: 3.6em; }
            .happy-emojis, .bottom-emojis { font-size: 3.2em; }
            .side-emoji { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="side-emojis">
        <div class="left-side" id="left-emojis"></div>
        <div class="right-side" id="right-emojis"></div>
    </div>
    
    <div class="card">
        <div class="main-title">Happy Birthday</div>
        <div class="happy-emojis">✨🎂💜</div>
        <div class="name-text">Meri Achi Bachi</div>
        <div class="bottom-emojis">💕🌟🎉</div>
    </div>

    <script>
        function createSideEmoji(containerId, emoji) {
            const container = document.getElementById(containerId);
            const emojiEl = document.createElement('div');
            emojiEl.className = 'side-emoji';
            emojiEl.innerHTML = emoji;
            emojiEl.style.top = Math.random() * 100 + '%';
            emojiEl.style.animationDuration = (Math.random() * 4 + 10) + 's';
            emojiEl.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(emojiEl);

            setTimeout(() => emojiEl.remove(), 16000);
        }

        // Sirf 2 emojis - left side 🙃, right side 🙂
        setInterval(() => createSideEmoji('left-emojis', '🙃'), 1200);
        setInterval(() => createSideEmoji('right-emojis', '🙂'), 1400);

        // Initial emojis
        for(let i = 0; i < 4; i++) {
            setTimeout(() => createSideEmoji('left-emojis', '🙃'), i * 800);
            setTimeout(() => createSideEmoji('right-emojis', '🙂'), i * 900);
        }
    </script>
</body>
</html>
